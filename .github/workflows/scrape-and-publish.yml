name: Scrape and publish meteorite inventory

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run scraper
        run: python scraper/scrape.py
      - name: Commit updated inventory data
        run: |
          git config user.name "meteorite-meta-search-bot"
          git config user.email "meteorite-meta-search-bot@users.noreply.github.com"
          git add data/listings.json
          git commit -m "Update meteorite inventory" || echo "No inventory changes"
          git push || echo "Nothing to push"
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
