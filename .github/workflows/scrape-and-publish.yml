name: Scrape meteorite inventory

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "data/listings.json"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-meteorite-inventory
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run scraper
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scraper/scrape.py --rotate --preserve-existing --rotation-key "${{ github.run_number }}"
          else
            python scraper/scrape.py
          fi
      - name: Validate inventory data
        run: python scraper/validate_listings.py
      - name: Commit updated inventory data
        run: |
          git config user.name "meteorite-meta-search-bot"
          git config user.email "meteorite-meta-search-bot@users.noreply.github.com"
          git add data/listings.json
          if git diff --cached --quiet; then
            echo "No inventory changes"
          else
            git commit -m "Update meteorite inventory"
            git push
          fi
