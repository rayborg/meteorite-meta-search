<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meteorite Meta Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Meteorite Meta Search</h1>
      <p>Private seller inventory monitor for meteorites, organized by type, subtype, price, weight, and price/g.</p>
    </div>
    <div class="status-card"><div class="label">Last updated</div><div id="updated">Loading…</div></div>
  </header>
  <main>
    <section class="summary-grid">
      <article><span class="big" id="totalListings">0</span><span>listings</span></article>
      <article><button id="sourcesSummary" class="summary-button" type="button" aria-controls="sourcesPanel" aria-expanded="false"><span class="big" id="totalSources">0</span><span>configured sources</span><span class="visually-hidden">Show the source information panel</span></button></article>
      <article><span class="big price-summary" id="avgPricePerG">—</span><span>avg price/g where available</span></article>
      <article><span class="big price-summary" id="bestDeal">—</span><span>lowest price/g</span></article>
    </section>
    <section id="sourcesPanel" class="sources-panel" aria-labelledby="sourcesHeading" hidden>
      <div class="section-heading">
        <div>
          <h2 id="sourcesHeading" tabindex="-1">Sources</h2>
        </div>
      </div>
      <div class="source-info-control">
        <label for="sourceInfoSelect">Show source details</label>
        <select id="sourceInfoSelect" autocomplete="off"></select>
      </div>
      <div id="sourceInfoDetail" class="source-info-detail" aria-live="polite" hidden></div>
    </section>
    <section class="controls">
      <input id="search" type="search" placeholder="Search NWA, pallasite, Gibeon, lunar, seller, subtype…">
      <select id="typeFilter"><option value="">All types</option></select>
      <select id="sourceFilter"><option value="">All sources</option></select>
      <select id="sortBy" autocomplete="off">
        <option value="title:asc" selected>Sort: meteorite name A-Z</option>
        <option value="price_per_g:asc">Sort: lowest price/g</option>
        <option value="price:asc">Sort: lowest price</option>
        <option value="weight_g:desc">Sort: largest weight</option>
        <option value="meteorite_type:asc">Sort: type/subtype</option>
        <option value="source:asc">Sort: source</option>
        <option value="available:asc">Sort: status</option>
        <option value="confidence:desc">Sort: confidence</option>
      </select>
      <label class="check-control"><input id="includeUnavailable" type="checkbox"> Include unavailable</label>
    </section>
    <section id="typeChips" class="chips"></section>
    <section class="table-wrap">
      <table>
        <thead><tr>
          <th data-sort="image" aria-sort="none"><button type="button" class="sort-header">Image <span class="sort-indicator"></span></button></th>
          <th data-sort="title" aria-sort="ascending"><button type="button" class="sort-header active">Meteorite <span class="sort-indicator">▲</span></button></th>
          <th data-sort="meteorite_type" aria-sort="none"><button type="button" class="sort-header">Type <span class="sort-indicator"></span></button></th>
          <th data-sort="subtype" aria-sort="none"><button type="button" class="sort-header">Subtype <span class="sort-indicator"></span></button></th>
          <th data-sort="price" aria-sort="none"><button type="button" class="sort-header">Price <span class="sort-indicator"></span></button></th>
          <th data-sort="weight_g" aria-sort="none"><button type="button" class="sort-header">Weight <span class="sort-indicator"></span></button></th>
          <th data-sort="price_per_g" aria-sort="none"><button type="button" class="sort-header">Price/g <span class="sort-indicator"></span></button></th>
          <th data-sort="source" aria-sort="none"><button type="button" class="sort-header">Source <span class="sort-indicator"></span></button></th>
          <th data-sort="available" aria-sort="none"><button type="button" class="sort-header">Status <span class="sort-indicator"></span></button></th>
          <th data-sort="confidence" aria-sort="none"><button type="button" class="sort-header">Confidence <span class="sort-indicator"></span></button></th>
        </tr></thead>
        <tbody id="results"></tbody>
      </table>
    </section>
  </main>
  <template id="rowTemplate">
    <tr>
      <td class="image-cell"><img class="thumb" alt="" loading="lazy" decoding="async" width="64" height="64" referrerpolicy="no-referrer" hidden><span class="no-image">No image</span></td>
      <td class="listing-cell"><a class="title" target="_blank" rel="noopener noreferrer"></a><div class="classification"></div></td>
      <td class="type"></td><td class="subtype"></td><td class="price"></td><td class="weight"></td><td class="ppg"></td><td class="source"></td><td class="availability"></td><td class="confidence"></td>
    </tr>
  </template>
  <script src="app.js"></script>
</body>
</html>
